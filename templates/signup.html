{% extends 'auth.html' %}
{% block title %}Signup{% endblock title %}
{% block form %}

{% include "messages.html" %}

<div class="subtitle ">
              <span>Signup</span>              
            </div>
<div class="container-fluid  d-flex ">                
<div class="card p-3 ">
    
    <form action="/signup" method="POST">
        
        <div class="form-group">
            <input class="form-control mb-2 " type="text" name="fname" placeholder="Enter your First name"
              required> 
        </div>
        
         <div class="form-group">
            <input class="form-control mb-2" type="text" name="lname" placeholder="Enter your last name"
              required> 
        </div>

        <div class="form-group">
            <input class="form-control mb-2" type="email" name="email" placeholder="Enter your Email"
              required> 
        </div>

        

        <div class="form-group">
            <input class="form-control mb-2" type="password" name="password" placeholder="Enter your password"
              required> 
        </div>

        <div class="form-group">
            <input class="form-control mb-2" type="text" name="phone" placeholder="Enter your phone number"
              required> 
        </div>
  <br>
  
             
  <div class="d-grid gap-2">
  <button class="btn btn-primary" type="submit">signup</button>
  </div>

</form>
</div>  
</div>  
  
             
{% endblock form %}
