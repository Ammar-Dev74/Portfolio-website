{% extends 'auth.html' %}
{% block title %}Login{% endblock title %}
{% block form %}
{% include "messages.html" %}


<div class="subtitle ">
              <span>Login</span>
</div>
<div class="container-fluid  d-flex ">                
<div class="card p-3 ">
    
    <form method="POST" action="{{ url_for('login') }}">
        <div class="form-group">
          
            <input class="from-control mb-2" type="email" name="email" placeholder="Enter your Email"
              required> 
        </div>


        <div class="form-group">
            <input class="from-control mb-2" type="password" name="password" placeholder="Enter your password"
              required> 
        </div>
  <br>
  
  <div class="d-grip gap-2">
  <button class="btn btn-primary" type="submit">Login</button>
  </div>

</form>
</div>  
</div>  
  
             
{% endblock form %}
